name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy -- -D warnings
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-clippy-
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: cargo test --lib (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-test-
      - name: Build lib
        run: cargo build --lib
      - name: Run lib tests
        run: cargo test --lib

  doc:
    name: cargo doc --no-deps
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-doc-
      # Build rustdoc for all public items and treat warnings as errors.
      # Full rendering tests require a physical display/GPU (Win32 + wgpu) and
      # are intentionally skipped on headless CI runners; only pure-math and
      # ring-buffer unit tests in src/ and tests/ run under `cargo test`.
      - name: cargo doc --no-deps
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  build:
    name: cargo build --release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-build-
      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: geodesic-wallpaper-windows
          path: target/x86_64-pc-windows-msvc/release/geodesic-wallpaper.exe
          if-no-files-found: error

  coverage:
    name: Code coverage (tarpaulin)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-coverage-
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Run tarpaulin
        run: cargo tarpaulin --lib --no-fail-fast --out Xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  security:
    name: Security audit (cargo-audit)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit
